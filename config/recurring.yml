production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  # S1-G2 · I1/D3 — drain the outbox on a short cadence.
  outbox_publisher:
    class: OutboxPublisherJob
    schedule: every minute
  # S1-G2 · I7 — retention sweep (prune old published, archive carve-out, alert stale).
  outbox_pruner:
    class: OutboxPrunerJob
    schedule: every day at 3am
  # S1-G2 · I4 — nightly stock reconciliation (alert-only, never fixes).
  stock_reconciliation:
    class: StockReconciliationJob
    schedule: every day at 4am
