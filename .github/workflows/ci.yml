name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager
      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  scan_js:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Lint code for consistent style
        run: bin/rubocop -f github

  # S1-G0 — mechanically enforced boundaries and conventions (D2/D4/D8).
  boundaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Packwerk validate (config sanity + graph acyclicity)
        run: bundle exec packwerk validate
      - name: Packwerk check (dependency + privacy enforcement)
        run: bundle exec packwerk check
      - name: Ban package_todo.yml (D2 — no baseline)
        run: bin/check-package-todos
      - name: Pack graph matches core spec §1 (D4)
        run: bin/check-pack-graph
      - name: Money lint (D8 — integer cents)
        run: bin/lint-money
      - name: Event payload schema compat (S1-G2 — additive only within a version)
        run: git fetch --no-tags --depth=50 origin main && bin/check-event-compat
      - name: Flag-usage discipline (S1-G2 — no flag checks inside models)
        run: bin/lint-flag-usage
      - name: Stock-write discipline (S1-G2 — movements only via Stock::Api)
        run: bin/lint-stock-writes
      - name: OpenAPI contract valid (S1-G3 — 3.1, 5 auth scopes, header-versioned)
        run: bin/lint-openapi
      - name: OpenAPI backward-compat (S1-G3 — contract may only grow within a version)
        run: git fetch --no-tags --depth=50 origin main && bin/check-openapi-compat

  test:
    runs-on: ubuntu-latest
    services:
      # PG16 to match the target; suite runs with the SAME role split as dev
      # (no "CI as superuser" divergence — D5 / I1.2).
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready" --health-interval=10s
          --health-timeout=5s --health-retries=5
    env:
      RAILS_ENV: test
      PGHOST: localhost
      PGPORT: "5432"
    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev libvips postgresql-client
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Provision roles + test DB (D5)
        env:
          PGADMIN_USER: postgres
          PGPASSWORD: postgres
        run: bin/provision-db core_next_test
      - name: Prepare test schema as app_migrator
        run: bin/db-migrate db:prepare
      - name: Apply role grants (S1-G2 · D7 — ACLs not in structure.sql)
        run: bin/db-migrate db:grants
      - name: Run tests as app_user
        run: bin/rails test
      - name: RLS policy matrix (S1-G1 — required, fails on any skip)
        run: bin/rails rls:matrix
      - name: RLS schema lint (S1-G1 — ENABLE+FORCE+policy on scoped tables)
        run: bin/rails lint:rls_schema
