# Root package — the shared platform KERNEL (app/ glue): boot, the RLS runtime (Rls),
# the event backbone (DomainEvents), tenancy (Tenant), ApplicationJob/Record.
#
# S1-G2 · D-delta (from S1-G0 D2): the kernel is intentionally UNENFORCED. The eight
# domain packs still enforce dependencies + privacy against EACH OTHER (that is the point
# of the modular monolith); but they all legitimately consume the shared kernel, and
# glue legitimately orchestrates packs through their public APIs. Enforcing the kernel
# too would force every shared constant into a public surface and create root⇄pack
# cycles. Packs that use the kernel declare `- "."` in their dependencies.
enforce_dependencies: false
enforce_privacy: false
